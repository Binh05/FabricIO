services:
  frontend:
    image: bin05/fab-fe:latest
    expose:
      - "80"
    volumes:
      - ../nginx/default:/etc/nginx/conf.d/default.conf:ro
    restart: always
    depends_on:
      - backend

  backend:
    image: bin05/fab-be:latest
    expose:
      - "8080"
    env_file:
      - ../backend/.env
    restart: always

  nginx:
    image: nginx:alpine
    container_name: fab_nginx_dev
    ports:
      - "5000:80"
    volumes:
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - ../nginx/default:/etc/nginx/sites-available/default:ro
    depends_on:
      - frontend
      - backend
    restart: always
