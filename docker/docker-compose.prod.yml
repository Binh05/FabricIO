services:
  frontend:
    image: bin05/fab-fe:1.0.1
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    volumes:
      - ./nginx/default:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fab-network

  backend:
    image: bin05/fab-be:1.0.0
    restart: unless-stopped
    environment:
      - .env
    networks:
      - fab-network

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - fab-network

networks:
  fab-network:
    driver: bridge
