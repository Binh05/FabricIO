version: "3.8"

services:
  frontend:
    image: bin05/fab-fe:1.0.0
    restart: always
    environment:
      - NODE_ENV=production
    ports:
      - "3000:80"

  backend:
    image: bin05/fab-be:1.0.0
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8080"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
