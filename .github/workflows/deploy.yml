name: CI/CD Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  Lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Thiết lập môi trường nodejs 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

  Backend-Test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check source
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run Tests
        run: ./gradlew test

  Build-And-Push-Fe-Image:
    runs-on: ubuntu-latest
    needs: Lint-test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout source code fe
        uses: actions/checkout@v4

      - name: Docker metadata (Frontend)
        id: meta-fe
        uses: docker/metadata-action@v5
        with:
          images: bin05/fab-fe
          tags: |
            type=semver,pattern={{version}},value={{raw}},prefix=v
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-fe.outputs.tags }}
          build-args: REACT_API_URL=${{ secrets.REACT_API_URL }}
          labels: ${{ steps.meta-fe.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  Build-And-Push-Be-Image:
    runs-on: ubuntu-latest
    needs: Backend-Test

    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check source code be
        uses: actions/checkout@v4

      - name: Docker metadata (Backend)
        id: meta-be
        uses: docker/metadata-action@v5
        with:
          images: bin05/fab-be
          tags: |
            type=semver,pattern={{version}},value={{raw}},prefix=v
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-be.outputs.tags }}
          labels: ${{ steps.meta-be.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: [Build-And-Push-Fe-Image, Build-And-Push-Be-Image]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy
        run: |
          cd /home/ubuntu/app
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            FINAL_VERSION="${GITHUB_REF_NAME#v}"
          else
            FINAL_VERSION="latest"
          fi
          echo "Deploying version: $FINAL_VERSION"
          sed -i '/^APP_VERSION=/d' .env
          echo "APP_VERSION=$FINAL_VERSION" >> .env
          docker pull bin05/fab-fe:$FINAL_VERSION
          docker pull bin05/fab-be:$FINAL_VERSION
          docker compose up -d --force-recreate
          docker image prune -f
